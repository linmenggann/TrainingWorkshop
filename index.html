<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教學訓練計畫主持人工作坊 報名表</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Google Fonts (Noto Sans TC) -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
        }
        /* 自訂背景圖片 */
        .bg-custom-image {
            background-image: url('https://github.com/linmenggann/TrainingWorkshop/raw/main/%E6%95%99%E5%AD%B8%E9%83%A8%E7%B5%84%E7%B9%94%E6%9E%B6%E6%A7%8B.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }
        /* 玻璃擬物化特效 */
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        /* 自定義滾動條 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
        }
        ::-webkit-scrollbar-thumb {
            background: #9333ea;
            border-radius: 4px;
        }
    </style>
</head>
<body class="bg-custom-image min-h-screen py-10 px-4 sm:px-6 lg:px-8 flex items-center justify-center text-gray-800">

    <div class="max-w-3xl w-full glass-panel rounded-3xl shadow-2xl overflow-hidden transform transition-all hover:scale-[1.01] duration-500">
        
        <!-- Header 區塊 -->
        <div class="bg-gradient-to-r from-purple-600 to-indigo-600 px-8 py-10 text-center text-white relative overflow-hidden">
            <!-- 裝飾用背景圈圈 -->
            <div class="absolute top-0 left-0 w-32 h-32 bg-white opacity-10 rounded-full -translate-x-10 -translate-y-10"></div>
            <div class="absolute bottom-0 right-0 w-40 h-40 bg-white opacity-10 rounded-full translate-x-10 translate-y-10"></div>
            
            <h1 class="text-3xl md:text-4xl font-black mb-3 tracking-wide drop-shadow-md">
                🚀 教學訓練計畫主持人工作坊 ✨
            </h1>
            <p class="text-purple-100 text-lg md:text-xl font-medium">歡迎報名參加，一同提升教學品質！ 🎉</p>
        </div>

        <!-- 內容區塊 -->
        <div class="p-8 md:p-10">
            
            <!-- 活動資訊卡片 -->
            <div class="bg-purple-50 rounded-2xl p-6 mb-8 border border-purple-100 shadow-inner">
                <h2 class="text-xl font-bold text-purple-800 mb-4 flex items-center">
                    <span class="text-2xl mr-2">📌</span> 活動資訊
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-gray-700 font-medium">
                    <div class="flex items-center space-x-3 bg-white p-3 rounded-lg shadow-sm">
                        <span class="text-2xl">📅</span>
                        <div>
                            <span class="block text-xs text-gray-400">日期</span>
                            <span class="text-indigo-900">2026/01/25</span>
                        </div>
                    </div>
                    <div class="flex items-center space-x-3 bg-white p-3 rounded-lg shadow-sm">
                        <span class="text-2xl">⏰</span>
                        <div>
                            <span class="block text-xs text-gray-400">時間</span>
                            <span class="text-indigo-900">9:00 ~ 16:00</span>
                        </div>
                    </div>
                    <div class="flex items-center space-x-3 bg-white p-3 rounded-lg shadow-sm md:col-span-2">
                        <span class="text-2xl">🏥</span>
                        <div>
                            <span class="block text-xs text-gray-400">地點</span>
                            <span class="text-indigo-900">奇美醫院 第五醫療大樓 6樓 563會議室</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 報名表單 -->
            <form id="registrationForm" class="space-y-6" onsubmit="submitForm(event)">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- 姓名 -->
                    <div>
                        <label for="name" class="block text-sm font-bold text-gray-700 mb-2">👤 姓名 <span class="text-red-500">*</span></label>
                        <input type="text" id="name" name="name" required placeholder="請輸入您的姓名" 
                            class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-purple-500 focus:ring-2 focus:ring-purple-200 transition-colors bg-white/50 backdrop-blur-sm">
                    </div>

                    <!-- 機構名 -->
                    <div>
                        <label for="institution" class="block text-sm font-bold text-gray-700 mb-2">🏢 機構名 <span class="text-red-500">*</span></label>
                        <input type="text" id="institution" name="institution" required placeholder="請輸入您所屬的機構" 
                            class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-purple-500 focus:ring-2 focus:ring-purple-200 transition-colors bg-white/50 backdrop-blur-sm">
                    </div>

                    <!-- 職稱 -->
                    <div>
                        <label for="jobTitle" class="block text-sm font-bold text-gray-700 mb-2">💼 職稱 <span class="text-red-500">*</span></label>
                        <input type="text" id="jobTitle" name="jobTitle" required placeholder="請輸入您的職稱" 
                            class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-purple-500 focus:ring-2 focus:ring-purple-200 transition-colors bg-white/50 backdrop-blur-sm">
                    </div>

                    <!-- 負責的職類 (下拉式選單) -->
                    <div>
                        <label for="category" class="block text-sm font-bold text-gray-700 mb-2">📋 負責的職類 <span class="text-red-500">*</span></label>
                        <select id="category" name="category" required 
                            class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-purple-500 focus:ring-2 focus:ring-purple-200 transition-colors bg-white/50 backdrop-blur-sm appearance-none cursor-pointer">
                            <option value="" disabled selected>請選擇職類 👇</option>
                            <option value="藥事">💊 藥事</option>
                            <option value="醫事放射">☢️ 醫事放射</option>
                            <option value="醫事檢驗">🔬 醫事檢驗</option>
                            <option value="護理">💉 護理</option>
                            <option value="營養">🥗 營養</option>
                            <option value="呼吸治療">🫁 呼吸治療</option>
                            <option value="聽力">👂 聽力</option>
                            <option value="物理治療">🏃‍♂️ 物理治療</option>
                            <option value="職能治療">🧩 職能治療</option>
                            <option value="臨床心理">🧠 臨床心理</option>
                            <option value="語言治療">🗣️ 語言治療</option>
                            <option value="其他">✨ 其他</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 pt-2">
                    <!-- 是否擔任計畫主持人 -->
                    <div class="bg-gray-50 p-4 rounded-xl border border-gray-100">
                        <label class="block text-sm font-bold text-gray-700 mb-3">👑 您目前是否擔任教學訓練計畫主持人？ <span class="text-red-500">*</span></label>
                        <div class="flex space-x-6">
                            <label class="flex items-center space-x-2 cursor-pointer group">
                                <input type="radio" name="isDirector" value="是" required class="w-5 h-5 text-purple-600 focus:ring-purple-500 border-gray-300">
                                <span class="text-gray-700 group-hover:text-purple-600 font-medium transition-colors">✅ 是</span>
                            </label>
                            <label class="flex items-center space-x-2 cursor-pointer group">
                                <input type="radio" name="isDirector" value="否" class="w-5 h-5 text-purple-600 focus:ring-purple-500 border-gray-300">
                                <span class="text-gray-700 group-hover:text-purple-600 font-medium transition-colors">❌ 否</span>
                            </label>
                        </div>
                    </div>

                    <!-- 參與方式 -->
                    <div class="bg-gray-50 p-4 rounded-xl border border-gray-100">
                        <label class="block text-sm font-bold text-gray-700 mb-3">💻 您預計以何種方式參與？ <span class="text-red-500">*</span></label>
                        <div class="flex space-x-6">
                            <label class="flex items-center space-x-2 cursor-pointer group">
                                <input type="radio" name="participationMode" value="實體" required class="w-5 h-5 text-purple-600 focus:ring-purple-500 border-gray-300">
                                <span class="text-gray-700 group-hover:text-purple-600 font-medium transition-colors">🏫 實體</span>
                            </label>
                            <label class="flex items-center space-x-2 cursor-pointer group">
                                <input type="radio" name="participationMode" value="線上" class="w-5 h-5 text-purple-600 focus:ring-purple-500 border-gray-300">
                                <span class="text-gray-700 group-hover:text-purple-600 font-medium transition-colors">🌐 線上</span>
                            </label>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 pt-2">
                    <!-- Email -->
                    <div>
                        <label for="email" class="block text-sm font-bold text-gray-700 mb-2">✉️ Email <span class="text-red-500">*</span></label>
                        <input type="email" id="email" name="email" required placeholder="example@email.com" 
                            class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-purple-500 focus:ring-2 focus:ring-purple-200 transition-colors bg-white/50 backdrop-blur-sm">
                    </div>

                    <!-- 聯繫電話 -->
                    <div>
                        <label for="phone" class="block text-sm font-bold text-gray-700 mb-2">📱 聯繫電話 <span class="text-red-500">*</span></label>
                        <input type="tel" id="phone" name="phone" required placeholder="09XX-XXX-XXX" 
                            class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-purple-500 focus:ring-2 focus:ring-purple-200 transition-colors bg-white/50 backdrop-blur-sm">
                    </div>
                </div>

                <!-- 提交按鈕 -->
                <div class="pt-6">
                    <button type="submit" id="submitBtn"
                        class="w-full bg-gradient-to-r from-purple-600 via-indigo-500 to-purple-600 hover:from-purple-500 hover:via-indigo-400 hover:to-purple-500 text-white font-bold py-4 px-8 rounded-xl shadow-lg transform transition-all hover:-translate-y-1 hover:shadow-purple-500/50 text-lg flex justify-center items-center">
                        <span class="mr-2">🚀</span> 立即送出報名 <span class="ml-2">✨</span>
                    </button>
                </div>
            </form>

            <!-- 頁尾聯絡資訊 -->
            <div class="mt-10 pt-6 border-t border-gray-100 flex flex-col md:flex-row justify-between items-center text-sm text-gray-500 space-y-2 md:space-y-0">
                <div class="flex items-center">
                    <span class="mr-2">🏢</span> 主辦單位：奇美醫院教學部
                </div>
                <div class="flex flex-col md:flex-row md:space-x-4 items-center">
                    <span class="flex items-center"><span class="mr-1">🙋‍♂️</span> 聯絡人：陳大頭</span>
                    <span class="hidden md:inline text-gray-300">|</span>
                    <span class="flex items-center"><span class="mr-1">📞</span> 聯繫電話：06-281-2811 分機 57112233</span>
                </div>
            </div>

        </div>
    </div>

    <!-- 成功提交彈跳視窗 (預設隱藏) -->
    <div id="successModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden items-center justify-center z-50 opacity-0 transition-opacity duration-300">
        <div class="bg-white p-8 rounded-3xl shadow-2xl max-w-sm w-full text-center transform scale-95 transition-transform duration-300" id="modalContent">
            <div class="text-6xl mb-4">🎉</div>
            <h3 class="text-2xl font-bold text-purple-800 mb-2">報名成功！</h3>
            <p class="text-gray-600 mb-6">我們已收到您的報名資料，期待在工作坊見到您！</p>
            <button onclick="closeModal()" class="w-full bg-purple-100 hover:bg-purple-200 text-purple-800 font-bold py-3 px-6 rounded-xl transition-colors">
                太棒了 👍
            </button>
        </div>
    </div>

    <script>
        // ======= ⚠️ 部署後，請將下方引號內的網址替換成您的 Google Apps Script Web App URL ⚠️ =======
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxahZmuauqqbhlF47qsLOgIE9rlmqaHfml6t6fritzpwZXY0MzaGmTsesMckbNZLOOp/exec'; 
        const MAX_CAPACITY = 4; // 設定限額人數

        // 頁面載入時檢查是否額滿
        window.addEventListener('DOMContentLoaded', checkCapacity);

        function checkCapacity() {
            const submitBtn = document.getElementById('submitBtn');
            const originalBtnHtml = submitBtn.innerHTML;
            
            submitBtn.innerHTML = '<span class="mr-2">⏳</span> 檢查名額中...';
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-75', 'cursor-not-allowed');

            fetch(scriptURL)
                .then(response => response.json())
                .then(data => {
                    // 過濾掉空行，計算有效報名人數
                    const validData = data.filter(row => row['姓名'] && row['姓名'].trim() !== '');
                    if (validData.length >= MAX_CAPACITY) {
                        // 已達限額，停用表單
                        disableForm();
                    } else {
                        // 還有名額，恢復按鈕狀態
                        submitBtn.innerHTML = originalBtnHtml;
                        submitBtn.disabled = false;
                        submitBtn.classList.remove('opacity-75', 'cursor-not-allowed');
                    }
                })
                .catch(error => {
                    console.error('檢查名額失敗:', error);
                    // 若檢查失敗先放行，交由後續處理
                    submitBtn.innerHTML = originalBtnHtml;
                    submitBtn.disabled = false;
                    submitBtn.classList.remove('opacity-75', 'cursor-not-allowed');
                });
        }

        function disableForm() {
            const form = document.getElementById('registrationForm');
            const elements = form.elements;
            
            // 將所有輸入框與選項停用並反灰
            for (let i = 0; i < elements.length; i++) {
                elements[i].disabled = true;
                if (elements[i].tagName !== 'FIELDSET') {
                    elements[i].classList.add('cursor-not-allowed', 'opacity-60', 'bg-gray-100');
                }
            }
            
            // 變更送出按鈕為紅色「已額滿」狀態
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.innerHTML = '<span class="mr-2">🔴</span> 本活動已額滿，停止受理報名';
            submitBtn.classList.replace('from-purple-600', 'from-red-600');
            submitBtn.classList.replace('via-indigo-500', 'via-red-500');
            submitBtn.classList.replace('to-purple-600', 'to-red-600');
            submitBtn.classList.replace('hover:from-purple-500', 'hover:from-red-500');
            submitBtn.classList.replace('hover:to-purple-500', 'hover:to-red-500');
        }

        function submitForm(event) {
            // 阻止表單預設提交跳轉行為
            event.preventDefault();
            
            const form = document.getElementById('registrationForm');
            const submitBtn = document.getElementById('submitBtn');
            const originalBtnHtml = submitBtn.innerHTML;

            // 改變按鈕狀態，顯示載入中 (避免使用者重複點擊)
            submitBtn.innerHTML = '<span class="mr-2">⏳</span> 資料傳送中...';
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-75', 'cursor-not-allowed');

            // 透過 FormData 自動抓取表單內所有帶有 name 屬性的欄位
            const formData = new FormData(form);

            // 透過 fetch 發送 POST 請求到 Google Apps Script
            fetch(scriptURL, { method: 'POST', body: formData })
                .then(response => {
                    // 恢復按鈕狀態
                    submitBtn.innerHTML = originalBtnHtml;
                    submitBtn.disabled = false;
                    submitBtn.classList.remove('opacity-75', 'cursor-not-allowed');

                    // 顯示成功視窗
                    showSuccessModal();

                    // 清空表單
                    form.reset();
                })
                .catch(error => {
                    console.error('Error!', error.message);
                    alert('抱歉，資料傳送發生錯誤，請稍後再試！');
                    
                    // 恢復按鈕狀態
                    submitBtn.innerHTML = originalBtnHtml;
                    submitBtn.disabled = false;
                    submitBtn.classList.remove('opacity-75', 'cursor-not-allowed');
                });
        }

        function showSuccessModal() {
            const modal = document.getElementById('successModal');
            const modalContent = document.getElementById('modalContent');
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            // 小小的延遲讓動畫能順利觸發
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalContent.classList.remove('scale-95');
                modalContent.classList.add('scale-100');
            }, 10);
        }

        function closeModal() {
            const modal = document.getElementById('successModal');
            const modalContent = document.getElementById('modalContent');
            
            modal.classList.add('opacity-0');
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-95');
            
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 300);
        }
    </script>
</body>
</html>
